apiVersion: v1
kind: Namespace
metadata:
  name: default
---
apiVersion: v1
kind: Secret
metadata:
  namespace: default
  name: example-provider-secret
type: Opaque
# Credentials are JSON: the external API endpoint and the static bearer token.
# These defaults target a locally running mock-apiserver (see hack/mock-apiserver)
# for out-of-cluster development; replace with real values in production.
stringData:
  credentials: '{"endpoint":"http://localhost:8088","token":"mock-secret-token"}'
---
apiVersion: learn.garyleungsky.io/v1alpha1
kind: ProviderConfig
metadata:
  name: example
  namespace: default
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: default
      name: example-provider-secret
      key: credentials
---
apiVersion: learn.garyleungsky.io/v1alpha1
kind: ClusterProviderConfig
metadata:
  name: example
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: default
      name: example-provider-secret
      key: credentials
